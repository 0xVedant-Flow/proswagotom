        .article-card {
            max-width: 900px;

            background: rgba(10, 14, 39, 0.85);

            padding: 20px 30px;
            background: rgba(0, 255, 255, 0.05);
        }

        .article-header h1 {
            font-family: var(--title-font);
            font-size: 2.2rem;
            color: var(--neon-cyan);
            margin-bottom: 10px;
            letter-spacing: 1px;

        .article-meta {

        /* Command Box Styling */
        .command-box {
            background: #000;
            border: 1px solid var(--neon-green);
            padding: 20px;
            margin: 25px 0;
            border-radius: 4px;
            position: relative;
            overflow-x: auto;
            color: var(--neon-green);
            box-shadow: inset 0 0 15px rgba(0, 255, 65, 0.1);
        }

        .command-box::before {
            content: "TERMINAL_INPUT";
            position: absolute;
            top: -10px;
            left: 15px;
            background: var(--bg-color);
            padding: 0 10px;
            font-size: 0.7rem;
            color: var(--neon-green);
            font-family: var(--terminal-font);
            border: 1px solid var(--neon-green);
        }

        code {
            background: rgba(0, 255, 65, 0.15);
            color: var(--neon-green);
            padding: 2px 6px;
            border-radius: 3px;
            font-family: var(--terminal-font);
            font-size: 0.95em;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            color: var(--text-dim);
            text-decoration: none;
            font-family: var(--terminal-font);
            font-size: 0.85rem;
            margin-bottom: 20px;
            transition: color 0.3s ease;
        }
        
        .back-link:hover {
            color: var(--neon-cyan);
            text-shadow: 0 0 8px var(--neon-cyan);
        }
